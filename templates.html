
<!DOCTYPE html>
<html>
<head>
<title>Select Template</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f7fa;
}

/* HEADER */
.header{
background:#1e3c72;
color:white;
text-align:center;
padding:25px;
}

/* SECTION */
.section{
padding:20px;
}

.section h2{
margin-bottom:10px;
color:#1e3c72;
}

/* GRID */
.templates{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

/* CARD */
.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
text-align:center;
margin:10px;
}

</style>
</head>

<body>

<div class="header">
<h1>Select Resume Template</h1>
<p>Choose your category</p>
</div>

<!-- 🔵 BASIC -->
<div class="section">
<h2>Basic Templates</h2>

<div class="templates">

<!-- TEMPLATE ADD HERE -->
<div class="card" onclick="selectTemplate('t1')">
<img src="https://via.placeholder.com/300x400">
<h3>Basic 1</h3>
</div>

</div>
</div>

<!-- 🟢 PROFESSIONAL -->
<div class="section">
<h2>Professional Templates</h2>

<div class="templates">

<!-- TEMPLATE ADD HERE -->
<div class="card" onclick="selectTemplate('t2')">
<img src="https://i.imgur.com/8Km9tLL.png">
<h3>Pro 1</h3>
</div>

</div>
</div>

<!-- 🟡 PREMIUM -->
<div class="section">
<h2>Premium Templates</h2>

<div class="templates">

<!-- TEMPLATE ADD HERE -->
<div class="card" onclick="selectTemplate('t3')">
<img src="https://via.placeholder.com/300x400">
<h3>Premium 1</h3>
</div>

</div>
</div>

<script>

/* TEMPLATE SELECT */
function selectTemplate(t){
localStorage.setItem("template",t);
window.location="form.html";
}

</script>

</body>
</html>
