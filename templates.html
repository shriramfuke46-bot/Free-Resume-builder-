<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Resume</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* HEADER */
.header{
  background:#374151;
  color:white;
  padding:30px;
  display:flex;
  align-items:center;
}

.header img{
  width:100px;
  height:100px;
  border-radius:50%;
  margin-right:20px;
  border:3px solid white;
}

.header h1{
  margin:0;
}

/* MAIN */
.container{
  display:flex;
  max-width:1000px;
  margin:20px auto;
  background:white;
}

/* LEFT SIDEBAR */
.left{
  width:30%;
  background:#e5e7eb;
  padding:20px;
}

.left h3{
  border-bottom:2px solid gray;
  padding-bottom:5px;
}

.left p{
  font-size:14px;
}

/* RIGHT CONTENT */
.right{
  width:70%;
  padding:20px;
}

.section{
  margin-bottom:20px;
}

.section h2{
  border-bottom:2px solid #374151;
  padding-bottom:5px;
}

/* FORM */
.form{
  max-width:800px;
  margin:auto;
  background:white;
  padding:20px;
  margin-top:20px;
  border-radius:10px;
}

input, textarea{
  width:100%;
  padding:8px;
  margin:5px 0;
}

button{
  width:100%;
  padding:10px;
  background:#374151;
  color:white;
  border:none;
}
</style>

</head>

<body>

<!-- FORM -->
<div class="form">
<h2>Fill Resume</h2>

<input type="file" id="photo">
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="location" placeholder="Location">

<textarea id="objective" placeholder="Career Objective"></textarea>
<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="experience" placeholder="Experience"></textarea>
<textarea id="education" placeholder="Education"></textarea>
<textarea id="projects" placeholder="Projects"></textarea>

<button onclick="gen()">Generate Resume</button>
</div>

<!-- RESUME -->
<div id="resume" style="display:none;">

<div class="header">
<img id="img">
<h1 id="rname"></h1>
</div>

<div class="container">

<!-- LEFT -->
<div class="left">
<h3>Contact</h3>
<p id="rphone"></p>
<p id="remail"></p>
<p id="rlocation"></p>

<h3>Skills</h3>
<p id="rskills"></p>
</div>

<!-- RIGHT -->
<div class="right">

<div class="section">
<h2>Career Objective</h2>
<p id="robj"></p>
</div>

<div class="section">
<h2>Experience</h2>
<p id="rexp"></p>
</div>

<div class="section">
<h2>Education</h2>
<p id="redu"></p>
</div>

<div class="section">
<h2>Projects</h2>
<p id="rpro"></p>
</div>

</div>

</div>

</div>

<script>
function gen(){

resume.style.display="block";

rname.innerText=name.value;
rphone.innerText=phone.value;
remail.innerText=email.value;
rlocation.innerText=location.value;
robj.innerText=objective.value;
rskills.innerText=skills.value;
rexp.innerText=experience.value;
redu.innerText=education.value;
rpro.innerText=projects.value;

/* PHOTO */
let file=photo.files[0];
if(file){
let reader=new FileReader();
reader.onload=e=>img.src=e.target.result;
reader.readAsDataURL(file);
}

}
</script>

</body>
</html>
