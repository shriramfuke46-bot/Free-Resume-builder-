<!DOCTYPE html>
<html>
<head>
<title>Resume</title>

<style>

body{
font-family:Arial;
background:#eee;
margin:0;
}

.resume{
width:800px;
margin:auto;
background:white;
padding:20px;
}

/* TEMPLATE 1 (Professional Top Header) */
.t1 .header{
text-align:center;
color:white;
padding:20px;
}

/* TEMPLATE 2 (Sidebar Style) */
.t2{
display:flex;
}

.t2 .left{
width:30%;
background:#2c3e50;
color:white;
padding:20px;
}

.t2 .right{
width:70%;
padding:20px;
}

img{
width:120px;
border-radius:50%;
}

button{
margin:20px;
padding:12px;
background:#28a745;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div id="resume" class="resume"></div>

<center>
<button onclick="downloadPDF()">Download PDF</button>
</center>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<script>

/* GET DATA */
let t = localStorage.getItem("template");
let name = localStorage.getItem("name");
let email = localStorage.getItem("email");
let phone = localStorage.getItem("phone");
let skills = localStorage.getItem("skills");
let education = localStorage.getItem("education");
let photo = localStorage.getItem("photo");
let color = localStorage.getItem("color");

/* TEMPLATE DESIGN */
let html="";

/* TEMPLATE 1 */
if(t=="t1"){
html=`
<div class="t1">
<div class="header" style="background:${color}">
<img src="${photo}">
<h1>${name}</h1>
<p>${email}</p>
<p>${phone}</p>
</div>

<h3>Skills</h3>
<p>${skills}</p>

<h3>Education</h3>
<p>${education}</p>

</div>`;
}

/* TEMPLATE 2 */
if(t=="t2"){
html=`
<div class="t2">

<div class="left">
<img src="${photo}">
<h2>${name}</h2>
<p>${email}</p>
<p>${phone}</p>
</div>

<div class="right">
<h3>Skills</h3>
<p>${skills}</p>

<h3>Education</h3>
<p>${education}</p>
</div>

</div>`;
}

document.getElementById("resume").innerHTML = html;

/* PDF DOWNLOAD */
function downloadPDF(){
const element = document.getElementById("resume");
html2pdf().from(element).save("resume.pdf");
}

</script>

</body>
</html>
