<!DOCTYPE html>
<html>
<head>
<title>Resume</title>

<style>

body{font-family:Arial;background:#eee;margin:0;}

.resume{
width:800px;
margin:auto;
background:white;
padding:20px;
}

/* TEMPLATE 1 (Shine Style) */
.t1 .header{
text-align:center;
color:white;
padding:20px;
}

/* TEMPLATE 2 (Sidebar) */
.t2{display:flex;}
.t2 .left{
width:30%;
background:#2c3e50;
color:white;
padding:20px;
}
.t2 .right{
width:70%;
padding:20px;
}

/* TEMPLATE 3 (Minimal) */
.t3 h1{border-bottom:2px solid #000;}

/* TEMPLATE 4 (Box Style) */
.t4 section{
border:1px solid #ccc;
padding:10px;
margin:10px 0;
}

/* TEMPLATE 5 (Dark Mode) */
.t5{
background:#222;
color:white;
}

/* TEMPLATE 6 (Two Column) */
.t6{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

img{
width:120px;
border-radius:50%;
}

button{
margin-top:20px;
padding:12px;
background:green;
color:white;
border:none;
}

</style>
</head>

<body>

<div id="resume" class="resume">

</div>

<button onclick="downloadPDF()">Download PDF</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<script>

let t = localStorage.getItem("template");
let name = localStorage.getItem("name");
let email = localStorage.getItem("email");
let phone = localStorage.getItem("phone");
let skills = localStorage.getItem("skills");
let education = localStorage.getItem("education");
let photo = localStorage.getItem("photo");
let color = localStorage.getItem("color");

let html="";

/* TEMPLATE SWITCH */

if(t=="t1"){
html=`
<div class="t1">
<div class="header" style="background:${color}">
<img src="${photo}">
<h1>${name}</h1>
<p>${email}</p>
<p>${phone}</p>
</div>
<h3>Skills</h3>
<p>${skills}</p>
<h3>Education</h3>
<p>${education}</p>
</div>`;
}

if(t=="t2"){
html=`
<div class="t2">
<div class="left">
<img src="${photo}">
<h2>${name}</h2>
<p>${email}</p>
<p>${phone}</p>
</div>
<div class="right">
<h3>Skills</h3>
<p>${skills}</p>
<h3>Education</h3>
<p>${education}</p>
</div>
</div>`;
}

if(t=="t3"){
html=`
<div class="t3">
<img src="${photo}">
<h1>${name}</h1>
<p>${email} | ${phone}</p>
<hr>
<h3>Skills</h3>
<p>${skills}</p>
<h3>Education</h3>
<p>${education}</p>
</div>`;
}

if(t=="t4"){
html=`
<div class="t4">
<center><img src="${photo}"></center>
<section>
<h2>${name}</h2>
<p>${email}</p>
<p>${phone}</p>
</section>
<section>
<h3>Skills</h3>
<p>${skills}</p>
</section>
<section>
<h3>Education</h3>
<p>${education}</p>
</section>
</div>`;
}

if(t=="t5"){
html=`
<div class="t5">
<center>
<img src="${photo}">
<h1>${name}</h1>
<p>${email}</p>
<p>${phone}</p>
</center>
<h3>Skills</h3>
<p>${skills}</p>
<h3>Education</h3>
<p>${education}</p>
</div>`;
}

if(t=="t6"){
html=`
<div class="t6">
<div>
<img src="${photo}">
<h2>${name}</h2>
<p>${email}</p>
<p>${phone}</p>
</div>
<div>
<h3>Skills</h3>
<p>${skills}</p>
<h3>Education</h3>
<p>${education}</p>
</div>
</div>`;
}

document.getElementById("resume").innerHTML=html;

/* PDF DOWNLOAD */

function downloadPDF(){
const element = document.getElementById("resume");

html2pdf().from(element).save("resume.pdf");
}

</script>

</body>
</html>
