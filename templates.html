<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Select Resume Template</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#f1f5f9;
}

/* HEADER */
.header{
  text-align:center;
  padding:30px;
  background:linear-gradient(135deg,#4f46e5,#9333ea);
  color:white;
}

.header h1{
  margin:0;
}

/* GRID */
.container{
  max-width:1100px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* IMAGE */
.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

/* CONTENT */
.card-body{
  padding:15px;
}

.card-body h3{
  margin:5px 0;
}

.btn{
  display:block;
  text-align:center;
  background:#4f46e5;
  color:white;
  padding:10px;
  border-radius:6px;
  text-decoration:none;
  margin-top:10px;
}

.btn:hover{
  background:#3730a3;
}
</style>

</head>

<body>

<div class="header">
<h1>Choose Your Resume Template</h1>
<p>Select a design to get started</p>
</div>

<div class="container">

<!-- TEMPLATE 1 -->
<div class="card">
<img src="https://via.placeholder.com/400x500">
<div class="card-body">
<h3>Basic Template</h3>
<p>Simple and clean layout</p>
<a href="template1.html" class="btn">Use Template</a>
</div>
</div>

<!-- TEMPLATE 2 -->
<div class="card">
<img src="https://via.placeholder.com/400x500">
<div class="card-body">
<h3>Professional Template</h3>
<p>Balanced and modern</p>
<a href="template2.html" class="btn">Use Template</a>
</div>
</div>

<!-- TEMPLATE 3 -->
<div class="card">
<img src="https://via.placeholder.com/400x500">
<div class="card-body">
<h3>Premium Template</h3>
<p>Stylish and advanced design</p>
<a href="template3.html" class="btn">Use Template</a>
</div>
</div>

</div>

</body>
</html>
