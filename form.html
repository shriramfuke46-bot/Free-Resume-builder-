<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Builder Form</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fb;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
  background:#4CAF50;
  color:white;
  padding:10px;
  border-radius:5px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

button{
  background:#4CAF50;
  color:white;
  padding:12px;
  border:none;
  width:100%;
  border-radius:5px;
  cursor:pointer;
}

.section{
  margin-bottom:20px;
}
</style>

</head>
<body>

<div class="container">

<h1>Create Resume</h1>

<form id="resumeForm">

<!-- Personal Info -->
<div class="section">
<h2>Personal Information</h2>
<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email">
<input type="text" placeholder="Phone Number">
<input type="text" placeholder="Address">
</div>

<!-- Summary -->
<div class="section">
<h2>Professional Summary</h2>
<textarea placeholder="Write your summary..."></textarea>
</div>

<!-- Experience -->
<div class="section">
<h2>Work Experience</h2>
<input type="text" placeholder="Job Title">
<input type="text" placeholder="Company Name">
<input type="text" placeholder="Duration (e.g. 2022-2024)">
<textarea placeholder="Describe your work..."></textarea>
</div>

<!-- Education -->
<div class="section">
<h2>Education</h2>
<input type="text" placeholder="Degree">
<input type="text" placeholder="College Name">
<input type="text" placeholder="Year">
</div>

<!-- Skills -->
<div class="section">
<h2>Skills</h2>
<textarea placeholder="HTML, CSS, JavaScript..."></textarea>
</div>

<!-- Projects -->
<div class="section">
<h2>Projects</h2>
<input type="text" placeholder="Project Name">
<textarea placeholder="Project Description"></textarea>
</div>

<button type="submit">Generate Resume</button>

</form>

</div>

</body>
</html>
